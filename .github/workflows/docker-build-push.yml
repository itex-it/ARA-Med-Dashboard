name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/itex-it/ara-med-dashboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://api.supabase.itex.at
            NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzY3OTQ4MDYyLCJleHAiOjE5MjU2MjgwNjJ9.ZCxcYt7WrqJCLObAx90f4YLH6c7qZ1vb1uvdqu8qu6I
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make GHCR package public
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/packages/container/ara-med-dashboard" \
            -d '{"visibility":"public"}' || echo "Package visibility update skipped (package may not exist yet or already public)"

      - name: Deploy to Portainer
        if: success()
        env:
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          PORTAINER_STACK_ID: ${{ secrets.PORTAINER_STACK_ID }}
        run: |
          if [ -z "$PORTAINER_API_KEY" ] || [ -z "$PORTAINER_STACK_ID" ]; then
            echo "PORTAINER_API_KEY or PORTAINER_STACK_ID not set — skipping"
            exit 0
          fi
          # Get current stack file
          FILE=$(curl -sf --max-time 10 \
            -H "X-API-Key: $PORTAINER_API_KEY" \
            "https://194.242.35.77:9443/api/stacks/$PORTAINER_STACK_ID/file" 2>/dev/null) || true
          ENV=$(curl -sf --max-time 10 \
            -H "X-API-Key: $PORTAINER_API_KEY" \
            "https://194.242.35.77:9443/api/stacks/$PORTAINER_STACK_ID?endpointId=3" 2>/dev/null) || true
          if [ -z "$FILE" ] || [ -z "$ENV" ]; then
            echo "⚠️  Cannot reach Portainer (firewall blocks GitHub Actions IPs)."
            echo "   Redeploy manually: PUT /api/stacks/$PORTAINER_STACK_ID?endpointId=3 with PullImage:true"
            exit 0
          fi
          CONTENT=$(echo "$FILE" | python3 -c "import sys,json; print(json.load(sys.stdin)['StackFileContent'])")
          ENVS=$(echo "$ENV" | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin).get('Env',[])))")
          PAYLOAD=$(python3 -c "import json,sys; print(json.dumps({'StackFileContent':sys.argv[1],'Env':json.loads(sys.argv[2]),'Prune':False,'PullImage':True}))" "$CONTENT" "$ENVS")
          HTTP=$(curl -sf --max-time 30 -X PUT \
            -H "X-API-Key: $PORTAINER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://194.242.35.77:9443/api/stacks/$PORTAINER_STACK_ID?endpointId=3" \
            -d "$PAYLOAD" -w "%{http_code}" -o /dev/null 2>/dev/null) || true
          if [ "$HTTP" = "200" ]; then
            echo "✅ Portainer redeploy triggered (Stack $PORTAINER_STACK_ID)"
          else
            echo "⚠️  Portainer redeploy failed (HTTP $HTTP) — pull new image manually in Portainer UI"
          fi
